# Backend CI/CD — Azure App Service (aligned with eGestion's pipeline)
# Replaces the previous Container Apps deployment. See docs/setup/azure-app-service-migration.md
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['apps/backend/**', '.github/workflows/backend.yml']
  pull_request:
    branches: [main]
    paths: ['apps/backend/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Medika.slnx --configuration Release
        working-directory: ./apps/backend

      # Quality gate — runs all test projects in the solution.
      # (No-op until Medika.Tests exists; do NOT remove this step.)
      - name: Test
        run: dotnet test Medika.slnx --configuration Release --no-build
        working-directory: ./apps/backend

      - name: Publish
        run: dotnet publish src/Medika.Api/Medika.Api.csproj -c Release -o ./publish
        working-directory: ./apps/backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: .net-app
          path: ./apps/backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      id-token: write # required for OIDC login
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'medika-api'
          package: .

      # Post-merge verification: a successful deploy ≠ a healthy app. Poll the
      # unauthenticated /api/health probe (cold start can take a minute) and fail
      # the run if prod never comes up — GitHub then notifies on the red run.
      - name: Smoke-check deployed app health (prod)
        shell: bash
        env:
          APP_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          base="${APP_URL%/}"
          [ -z "$base" ] && base="https://medika-api.azurewebsites.net"
          url="$base/api/health"
          echo "Post-deploy health check → $url"
          for i in $(seq 1 12); do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 15 "$url" || echo 000)
            if [ "$code" = "200" ]; then echo "Healthy (HTTP 200) on attempt $i"; exit 0; fi
            echo "Attempt $i/12: HTTP $code — waiting for warm-up…"; sleep 15
          done
          echo "::error::$url did not return 200 within ~3 min after deploy"; exit 1
