name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['apps/backend/**', '.github/workflows/backend.yml']
  pull_request:
    branches: [main]
    paths: ['apps/backend/**']

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: medika-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore apps/backend/src/Medika.Api/Medika.Api.csproj

      - name: Build
        run: dotnet build apps/backend/src/Medika.Api/Medika.Api.csproj --no-restore -c Release

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          az acr login --name ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                       -f apps/backend/Dockerfile apps/backend
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "MongoDB__ConnectionString=secretref:mongodb-uri" \
              "Jwt__Secret=secretref:jwt-secret" \
              "R2__AccountId=secretref:r2-account-id" \
              "R2__AccessKeyId=secretref:r2-access-key-id" \
              "R2__SecretAccessKey=secretref:r2-secret-access-key"
