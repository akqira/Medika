# Backend CI/CD — Azure App Service (aligned with eGestion's pipeline)
# Replaces the previous Container Apps deployment. See docs/setup/azure-app-service-migration.md
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['apps/backend/**', '.github/workflows/backend.yml']
  pull_request:
    branches: [main]
    paths: ['apps/backend/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Medika.slnx --configuration Release
        working-directory: ./apps/backend

      # Quality gate — runs all test projects in the solution.
      # (No-op until Medika.Tests exists; do NOT remove this step.)
      - name: Test
        run: dotnet test Medika.slnx --configuration Release --no-build
        working-directory: ./apps/backend

      - name: Publish
        run: dotnet publish src/Medika.Api/Medika.Api.csproj -c Release -o ./publish
        working-directory: ./apps/backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./apps/backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      id-token: write # required for OIDC login
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'medika-api'
          package: .
