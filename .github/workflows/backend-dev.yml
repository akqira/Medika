# Backend CI/CD — DEV/STAGING environment (mirrors eGestion's dev-eGestion-Api)
# Push to 'dev' branch → build + test → deploy to dev-medika-api
name: Backend CI/CD (dev)

on:
  push:
    branches: [dev]
    paths: ['apps/backend/**', '.github/workflows/backend-dev.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Medika.slnx --configuration Release
        working-directory: ./apps/backend

      - name: Test
        run: dotnet test Medika.slnx --configuration Release --no-build
        working-directory: ./apps/backend

      - name: Publish
        run: dotnet publish src/Medika.Api/Medika.Api.csproj -c Release -o ./publish
        working-directory: ./apps/backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: .net-app
          path: ./apps/backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DEV }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App (dev)
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dev-medika-api'
          package: .

      # Post-merge verification: a successful deploy ≠ a healthy app. Poll the
      # unauthenticated /api/health probe (cold start can take a minute) and fail
      # the run if the dev app never comes up — GitHub then notifies on the red run.
      - name: Smoke-check deployed app health (dev)
        shell: bash
        env:
          APP_URL: ${{ steps.deploy.outputs.webapp-url }}
        run: |
          base="${APP_URL%/}"
          [ -z "$base" ] && base="https://dev-medika-api.azurewebsites.net"
          url="$base/api/health"
          echo "Post-deploy health check → $url"
          for i in $(seq 1 12); do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 15 "$url" || echo 000)
            if [ "$code" = "200" ]; then echo "Healthy (HTTP 200) on attempt $i"; exit 0; fi
            echo "Attempt $i/12: HTTP $code — waiting for warm-up…"; sleep 15
          done
          echo "::error::$url did not return 200 within ~3 min after deploy"; exit 1
