name: Frontend CI

# Build/type-check only. Deployments are handled by Vercel's GitHub integration
# (auto-deploys every push: production on main, preview on other branches).
on:
  push:
    branches: [main, dev]
    paths: ['apps/frontend/**', '.github/workflows/frontend.yml']
  pull_request:
    branches: [main, dev]
    paths: ['apps/frontend/**']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Version is read from package.json "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm --filter frontend install

      - name: Type-check
        run: pnpm --filter frontend check

      - name: Build
        run: pnpm --filter frontend build
        env:
          API_URL: ${{ secrets.API_URL || 'https://api.medika.app' }}
